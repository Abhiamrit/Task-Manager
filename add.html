<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add New Task</title>

<link rel="stylesheet" href="style.css">
<script src="todo.js" defer></script>

</head>

<body>

<button id="dark-toggle" class="dark-toggle">🌙</button>

<a href="index.html" class="back-btn">←</a>

<div class="add-page">

<h1>Add New Task</h1>

<form id="task-form">

<input id="task-title" placeholder="Task Name *" required>

<textarea id="task-desc" placeholder="Task Description"></textarea>

<input type="date" id="task-deadline">

<label>Category</label>

<select id="task-category" required>

<option value="" disabled selected>Select Category</option>
<option value="Coding">💻 Coding</option>
<option value="Home">🏠 Home</option>
<option value="Work">🏢 Work</option>
<option value="Fitness">💪 Fitness</option>
<option value="Education">📚 Education</option>
<option value="Personal">👤 Personal</option>

</select>

<label>Color</label>

<select id="task-color" required>

<option value="#9333ea">🟣 Purple</option>
<option value="#3b82f6">🔵 Blue</option>
<option value="#22c55e">🟢 Green</option>
<option value="#facc15">🟡 Yellow</option>
<option value="#fb923c">🟠 Orange</option>
<option value="#ef4444">🔴 Red</option>

</select>

<button class="create-btn" type="submit">
Create Task
</button>

</form>

</div>

</body>
</html>
